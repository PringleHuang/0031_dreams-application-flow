  "1014654": "1016648"    # 併聯審查意見書

# =============================================================================
# 案件狀態欄位
# =============================================================================
status_field_id: "1015456"    # 案件管理表單的案件狀態欄位 ID

# =============================================================================
# 串接資訊欄位（用於 Webhook 回寫時解析目標記錄 ID）
# =============================================================================
# DREAMS_APPLY_ID 格式："{prefix}-{ragic_record_id}"
# 從 Webhook payload 中取得 DREAMS_APPLY_ID，以 "-" split 取第二段即為
# 案件管理表單的 RAGIC record ID，可直接用於 API URL：
# https://ap13.ragic.com/solarcs/business-process2/2/{record_id}
dreams_apply_id_field:
  questionnaire_form: "1016284"    # DREAMS案場申請單中的 DREAMS_APPLY_ID 欄位
  supplement_form: "1016649"       # DREAMS案場-補單中的 DREAMS_APPLY_ID 欄位
  case_form: "1016557"             # DREAMS申請管理中的 DREAMS_APPLY_ID 欄位

shipment_order_id_field:
  questionnaire_form: "1015022"    # DREAMS案場申請單中的出貨單號欄位
  supplement_form: "1016666"       # DREAMS案場-補單中的出貨單號欄位
  case_form: "1015021"             # DREAMS申請管理中的出貨單號欄位

# =============================================================================
# 補件參數對應（問卷結果/台電審核結果 → 補件參數代碼）
# 當「問卷結果」或「台電審核結果」欄位值為 "Fail" 或 "Yes" 時，
# 將對應的補件參數代碼匯總為 "|" 分隔字串，以 pfv 帶入補件問卷連結
# 補件問卷：DREAMS案場-補單（work-survey/9）
# pfv 格式：pfv1016697=A|B|F
# =============================================================================
supplement_form_path: "work-survey/9"
supplement_params_field_id: "1016697"    # 補件問卷中的「補件參數」多選欄位 ID
supplement_params_separator: "|"         # 多選欄位值分隔符號

supplement_param_codes:
  "1014650": "A"    # 審訖圖
  "1014652": "B"    # 細部協商
  "1014651": "C"    # 縣府同意備案函文
  "1014653": "D"    # 購售電契約封面及內文第一頁
  "1014654": "E"    # 併聯審查意見書
  "1014595": "F"    # 案場詳細地址
  "1014590": "G"    # 電號
  "1014749": "H"    # 裝置量(kW)
  "1014618": "I"    # 案場類型
  "1014623": "J"    # 縣府同意備案函文編號
  "1014620": "K"    # 售電方式
  "1014619": "L"    # 併聯方式（與併聯點型式、併聯點電壓同組）
  "1014621": "L"    # 併聯點型式（與併聯方式、併聯點電壓同組）
  "1014644": "L"    # 併聯點電壓（與併聯方式、併聯點型式同組）
  "1014622": "M"    # 責任分界點型式（與責任分界點電壓同組）
  "1014645": "M"    # 責任分界點電壓（與責任分界點型式同組）
  "1016553": "N"    # 逆變器匯總

# =============================================================================
# 補件群組定義
# 同一群組中的欄位，只要有一個 Fail/Yes，整組都要進行補件處理
# =============================================================================
supplement_param_groups:
  # 併聯方式 + 併聯點型式 + 併聯點電壓 → 同一組（代碼 L）
  "L":
    - "1014619"    # 併聯方式
    - "1014621"    # 併聯點型式
    - "1014644"    # 併聯點電壓
  # 責任分界點型式 + 責任分界點電壓 → 同一組（代碼 M）
  "M":
    - "1014622"    # 責任分界點型式
    - "1014645"    # 責任分界點電壓

# =============================================================================
# 補件問卷欄位映射（DREAMS案場-補單 work-survey/9 → DREAMS申請管理 business-process2/2）
# 補件問卷回覆後，用 payload 中的新值覆蓋案件管理表的對應欄位
# 格式：補件問卷欄位 ID → 案件管理表欄位 ID
