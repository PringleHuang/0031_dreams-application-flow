# RAGIC 欄位映射配置
# 
# 本檔案定義問卷表單（DREAMS案場申請單）與案件管理表單（DREAMS申請管理）之間的欄位對應關係。
# 
# ⚠️ 注意：此為專案起始時的設定。RAGIC 表單設計可能因修改而有出入，
#    若欄位 ID 不正確，請依實際 RAGIC 表單設定更新本檔案。
#
# 欄位 ID 格式：RAGIC 欄位 ID（數字字串）
# 來源表單：DREAMS案場申請單（work-survey/7）
# 目標表單：DREAMS申請管理（business-process2/2）

# =============================================================================
# 直接填入欄位（問卷回覆後直接寫入案件管理表單，不需 AI 判定）
# 格式：問卷欄位 ID → 案件管理表單欄位 ID
# =============================================================================
direct_mapping:
  # 客戶資訊（不驗證）
  "1016556": "1016643"    # DREAMS 申請流程
  "1014563": "1015398"    # 客戶 (系統商)
  "1014564": "1014670"    # 案場名稱
  "1014649": "1015400"    # 案場售電申請類別
  "1014588": "1015408"    # 總表
  "1014616": "1015403"    # MODEL NAME
  "1014567": "1015404"    # 友達資料收集器序號
  "1014617": "1015406"    # DREAMS 申請年限
  "1014565": "1015401"    # 市電併聯日
  "1014566": "1015402"    # 系統報峻日
  "1014591": "1015410"    # 現場安裝聯絡人-姓名
  "1014592": "1015411"    # 現場安裝聯絡人-電話
  "1016553": "1016641"    # 逆變器匯總
  "1016555": "1016642"    # 負責人匯總

  # 客戶資訊（須驗證）— 直接填入部分
  "1014595": "1015399"    # 案場詳細地址
  "1014590": "1015407"    # 電號
  "1014749": "1015409"    # 裝置量(kW)
  "1014618": "1015412"    # 案場類型
  "1014623": "1015413"    # 縣府同意備案函文編號
  "1014620": "1015414"    # 售電方式
  "1014619": "1015415"    # 併聯方式
  "1014621": "1015417"    # 併聯點型式
  "1014644": "1015419"    # 併聯點電壓
  "1014622": "1015416"    # 責任分界點型式
  "1014645": "1015418"    # 責任分界點電壓

  # 檔案上傳（佐證文件）
  "1014650": "1015048"    # 審訖圖
  "1014652": "1015049"    # 細部協商
  "1014651": "1015020"    # 縣府同意備案函文
  "1014653": "1015051"    # 購售電契約封面及內文第一頁
  "1014654": "1015050"    # 併聯審查意見書

# =============================================================================
# LLM 判定結果填入欄位
# AI 逐份文件判定後，將判定出的值寫入案件管理表單對應欄位
# 格式：文件名稱 → { 問卷欄位ID: 案件管理表單目標欄位ID }
# =============================================================================
llm_result_mapping:
  審訖圖:
    "1014595": "1016519"    # 案場詳細地址
    "1014749": "1016520"    # 裝置量(kW)
    "1014619": "1016521"    # 併聯方式
    "1014621": "1016522"    # 併聯點型式
    "1014644": "1016523"    # 併聯點電壓
    "1014622": "1016524"    # 責任分界點型式
    "1014645": "1016525"    # 責任分界點電壓
    "1016553": "1016698"    # 逆變器匯總

  細部協商:
    "1014618": "1016527"    # 案場類型
    "1014620": "1016526"    # 售電方式
    "1014619": "1016528"    # 併聯方式
    "1014621": "1016529"    # 併聯點型式
    "1014644": "1016530"    # 併聯點電壓
    "1014622": "1016531"    # 責任分界點型式
    "1014645": "1016532"    # 責任分界點電壓

  縣府同意備案函文:
    "1014623": "1016534"    # 縣府同意備案函文編號
    "1014620": "1016535"    # 售電方式
    "1014618": "1016533"    # 案場類型

  購售電契約封面及內文第一頁:
    "1014595": "1016536"    # 案場詳細地址
    "1014590": "1016537"    # 電號
    "1014618": "1016538"    # 案場類型
    "1014620": "1016539"    # 售電方式

  併聯審查意見書:
    # 此文件無 LLM 結果填入欄位

# =============================================================================
# 判讀結果欄位 — 問卷結果（AI 佐證文件判定 Pass/Fail）
# AI 判定每個驗證欄位後，將 "Pass" 或 "Fail" 寫入對應欄位
# 格式：問卷欄位ID → 案件管理表單「問卷結果」欄位ID
# =============================================================================
questionnaire_result_mapping:
  "1014595": "1016540"    # 案場詳細地址
  "1014590": "1016541"    # 電號
  "1014749": "1016542"    # 裝置量(kW)
  "1014618": "1016544"    # 案場類型
  "1014623": "1016545"    # 縣府同意備案函文編號
  "1014620": "1016546"    # 售電方式
  "1014619": "1016547"    # 併聯方式
  "1014621": "1016548"    # 併聯點型式
  "1014644": "1016549"    # 併聯點電壓
  "1014622": "1016550"    # 責任分界點型式
  "1014645": "1016551"    # 責任分界點電壓
  "1016553": "1016699"    # 逆變器匯總
  "1014650": "1016644"    # 審訖圖
  "1014652": "1016645"    # 細部協商
  "1014651": "1016646"    # 縣府同意備案函文
  "1014653": "1016647"    # 購售電契約封面及內文第一頁
  "1014654": "1016648"    # 併聯審查意見書

# =============================================================================
# 判讀結果欄位 — 台電審核結果（台電回信語意分析 Pass/Fail）
# 台電回信語意分析後，判定失敗的欄位填 "Fail"，沒失敗的填 "Pass"
# 格式：問卷欄位ID → 案件管理表單「台電審核結果」欄位ID
# =============================================================================
taipower_result_mapping:
  "1014595": "1016560"    # 案場詳細地址
  "1014590": "1016561"    # 電號
  "1014749": "1016562"    # 裝置量(kW)
  "1014618": "1016563"    # 案場類型
  "1014623": "1016564"    # 縣府同意備案函文編號
  "1014620": "1016565"    # 售電方式
