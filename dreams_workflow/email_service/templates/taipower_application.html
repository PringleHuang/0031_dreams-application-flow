<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"></head>
<body style="font-family: 'Microsoft JhengHei', sans-serif; line-height: 1.8; color: #333;">
<p>您好，</p>

<p>以下為 DREAMS 台電站點申請案件資料，煩請協助審核：</p>

<table style="border-collapse: collapse; margin: 16px 0;">
  <tr>
    <td style="padding: 8px; border: 1px solid #ddd; background: #f5f5f5;"><strong>案件編號</strong></td>
    <td style="padding: 8px; border: 1px solid #ddd;">{{ case_id }}</td>
  </tr>
  <tr>
    <td style="padding: 8px; border: 1px solid #ddd; background: #f5f5f5;"><strong>電號</strong></td>
    <td style="padding: 8px; border: 1px solid #ddd;">{{ electricity_number }}</td>
  </tr>
  <tr>
    <td style="padding: 8px; border: 1px solid #ddd; background: #f5f5f5;"><strong>客戶名稱</strong></td>
    <td style="padding: 8px; border: 1px solid #ddd;">{{ customer_name }}</td>
  </tr>
</table>

<p>附件包含：</p>
<ul>
  <li>申請資料 PDF</li>
  <li>佐證文件（共 {{ document_count }} 份）</li>
</ul>

<p>煩請審核後回覆此郵件告知審核結果，謝謝。</p>

<p>祝 商祺</p>
</body>
</html>
