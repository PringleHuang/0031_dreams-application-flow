# Email Service Configuration
# 郵件範本配置：定義每種郵件類型的主旨、範本檔案、連結參數
#
# link.dynamic_params 映射格式：
#   URL參數名: template_data中的key名
#   例如 "default_1000123: case_id" 表示從 template_data["case_id"] 取值
#   填入 URL 的 ?default_1000123=<value>

sender:
  name: "DREAMS 太陽能管理系統"
  email: "${SES_SENDER_EMAIL}"  # 從環境變數讀取

# =============================================================================
# 收件人設定
# =============================================================================
# recipient_field_id: Webhook payload 中客戶 email 的欄位 ID
# ⚠️ RAGIC 表單設計可能修改，若欄位 ID 變更請更新此處
recipient_field_id: "1016558"

# =============================================================================
# Payload 欄位 ID 對應（RAGIC 表單設計可能修改，統一在此設定）
# =============================================================================
payload_field_ids:
  dreams_apply_id: "1016557"      # DREAMS_APPLY_ID 欄位 ID
  customer_email: "1016558"       # 聯絡人郵件欄位 ID
  shipment_order_id: "1015021"    # 出貨單號欄位 ID
  case_status: "1015456"          # 案件狀態欄位 ID

# =============================================================================
# 抄送（CC）設定
# =============================================================================
cc:
  # 靜態抄送名單（固定 email 地址）
  # ⚠️ SES sandbox 模式下，CC 收件人也需要先驗證
  static_list: []
    # - "pringle.huang@gmail.com"

  # RAGIC 表單 mail loop（動態產生，每封信自動加入對應案件的 RAGIC 表單 email）
  # 格式：{account_id}.{tab_name}.{sheet_id}.{record_id}@tickets.ragic.com
  # ⚠️ SES sandbox 模式下需關閉，production 模式再啟用
  ragic_mail_loop:
    enabled: false
    account_id: "solarcs"
    tab_name: "business-process2"
    sheet_id: "2"
    domain: "tickets.ragic.com"
    # record_id 從 case_id（即 RAGIC record ID）動態帶入

templates:
  anomaly_notification:
    subject: "【DREAMS異常通知】_{dreams_apply_id}"
    template_file: "anomaly_notification.html"
    link: null

  questionnaire_notification:
    subject: "【DREAMS申辦】_{dreams_apply_id}_請填寫問卷提供案場的建置資訊"
    template_file: "questionnaire_notification.html"
    link:
      base_url: "https://ap13.ragic.com/solarcs/work-survey/7"
      static_params:
        ragic-web-embed: "true"
        webaction: "form"
        ver: "new"
        version: "2"
      dynamic_params:
        # pfv 預填值：僅帶入 DREAMS_APPLY_ID，問卷會自行填入出貨編號
        pfv1016284: "dreams_apply_id"

  supplement_notification:
    subject: "【DREAMS補件】_{dreams_apply_id}/案場_{site_name}"
    template_file: "supplement_notification.html"
    link:
      base_url: "https://ap13.ragic.com/solarcs/work-survey/9"
      static_params:
        ragic-web-embed: "true"
        webaction: "form"
        ver: "new"
        version: "2"
      dynamic_params:
        # pfv 預填值：從案件管理表（business-process2/2）欄位帶入
        # pfv{補件問卷欄位ID}: "template_data中的key"
        # 值來源 = webhook payload 中案件管理表的欄位 ID
        pfv1016649: "dreams_apply_id"       # DREAMS_APPLY_ID (案件管理表 1016557)
        pfv1016652: "site_name"             # 案場名稱 (案件管理表 1014670)
        pfv1016697: "supplement_params"     # 補件代碼 (程式產生, 如 A|F|L)
      multi_select_separator: "|"

  taipower_application:
    subject: "【DREAMS審核】_{dreams_apply_id}/案場_{site_name}/電號{electricity_number}"
    template_file: "taipower_application.html"
    link: null

  taipower_electricity_request:
    subject: "【DREAMS電號新增】_{dreams_apply_id}_案場資訊釐清/{site_name}電號{electricity_number}"
    template_file: "taipower_electricity_request.html"
    link: null

  taipower_supplement:
    subject: "【DREAMS台電補件】_{dreams_apply_id}/案場_{site_name}"
    template_file: "taipower_supplement.html"
    link:
      base_url: "https://ap13.ragic.com/solarcs/work-survey/9"
      static_params:
        ragic-web-embed: "true"
        webaction: "form"
        ver: "new"
        version: "2"
      dynamic_params:
        # pfv 預填值：補件參數（多選欄位，以 | 分隔）+ 出貨編號 + DREAMS_APPLY_ID
        pfv1016697: "supplement_params"
        pfv1016666: "shipment_order_id"
        pfv1016649: "dreams_apply_id"
      multi_select_separator: "|"

  approval_notification:
    subject: "【DREAMS核可】_{dreams_apply_id}/案場_{site_name}/電號{electricity_number}"
    template_file: "approval_notification.html"
    link: null

  account_activation:
    subject: "【DREAMS帳號開通】_{dreams_apply_id}/案場_{site_name}/電號{electricity_number}"
    template_file: "account_activation.html"
    link:
      base_url: "https://dreams.plato-io.com"
      static_params: {}
      dynamic_params: {}
