# Mail Receiver Configuration
# 台電回信接收與案件比對設定

# =============================================================================
# 台電聯絡人白名單（可接受的寄件人 email）
# 只有在此名單中的寄件人，郵件才會被處理
# =============================================================================
allowed_senders:
  - "pringle.huang@gmail.com"    # 測試用
  - "dreams@taipower.com.tw"     # 台電 DREAMS 系統
  # - "其他台電聯絡人@taipower.com.tw"

# =============================================================================
# 主旨解析規則
# 從郵件主旨中提取 DREAMS_APPLY_ID
# 支援 Re: / Fwd: 前綴
# =============================================================================
subject_patterns:
  # 【DREAMS審核】_TEST0011-26/案場_xxx/電號xxx
  - "【DREAMS[^】]*】[_\\s]*([A-Za-z0-9]+-\\d+)"
  # 直接包含 DREAMS_APPLY_ID 格式
  - "([A-Za-z0-9]+-\\d+)"

# =============================================================================
# 郵件分類關鍵字（從郵件內容判斷類型）
# 依序比對，第一個匹配的類型生效
# =============================================================================
email_classification:
  # 電號已建立（台電手動新增電號後回覆）
  electricity_number_created:
    keywords:
      - "電號已手動新增"
      - "請您再嘗試申請"
      - "電號已新增"
      - "已手動建入"

  # 案場核可（審核通過）
  approved:
    keywords:
      - "已通過審核"
      - "案場已通過審核"

  # 案場駁回（審核未通過，需用 LLM 提取駁回原因）
  rejected:
    keywords:
      - "未通過審核"
      - "案場未通過審核"
